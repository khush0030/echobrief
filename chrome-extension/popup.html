<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EchoBrief</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: white;
    }
    
    .popup-container {
      padding: 20px;
    }
    
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    
    .logo {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    
    .title {
      font-size: 18px;
      font-weight: 600;
    }
    
    .subtitle {
      font-size: 12px;
      color: #94a3b8;
    }
    
    .status-card {
      background: #1e293b;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }
    
    .status-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }
    
    .status-dot.recording {
      background: #ef4444;
      animation: pulse 1.5s infinite;
    }
    
    .status-dot.idle {
      background: #64748b;
    }
    
    .status-dot.ready {
      background: #22c55e;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .status-text {
      font-weight: 500;
      font-size: 14px;
    }
    
    .status-detail {
      font-size: 13px;
      color: #94a3b8;
    }
    
    .duration {
      font-size: 24px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      margin-top: 8px;
    }
    
    .actions {
      display: flex;
      gap: 8px;
    }
    
    .btn {
      flex: 1;
      padding: 10px 16px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn-primary {
      background: #3b82f6;
      color: white;
    }
    
    .btn-primary:hover {
      background: #2563eb;
    }
    
    .btn-danger {
      background: #ef4444;
      color: white;
    }
    
    .btn-danger:hover {
      background: #dc2626;
    }
    
    .btn-secondary {
      background: #334155;
      color: white;
    }
    
    .btn-secondary:hover {
      background: #475569;
    }
    
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .login-prompt {
      text-align: center;
      padding: 20px;
    }
    
    .login-prompt p {
      color: #94a3b8;
      margin-bottom: 16px;
      font-size: 14px;
    }
    
    .footer {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #334155;
      text-align: center;
    }
    
    .footer a {
      color: #3b82f6;
      text-decoration: none;
      font-size: 13px;
    }
    
    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="popup-container">
    <div class="header">
      <div class="logo">🎙️</div>
      <div>
        <div class="title">EchoBrief</div>
        <div class="subtitle">Auto Meeting Recorder</div>
      </div>
    </div>
    
    <div id="content">
      <!-- Content populated by popup.js -->
    </div>
    
    <div class="footer">
      <a href="https://echobrief.lovable.app" target="_blank">Open EchoBrief Dashboard</a>
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
